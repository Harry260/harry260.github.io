<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <script>
            //Listen to parent page
                window.onmessage = function(e){
                    if(e.data){
                        var in_data = e.data;
                        var type = in_data.split("|");
                        if(type === "cmd"){
                            setVideo(in_data)
                        }
                        else {
                            setCmd(in_data)
                        }

                    }
                };
            
                function makeid(length) {
                    var result           = [];
                    var characters       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    var charactersLength = characters.length;
                    for ( var i = 0; i < length; i++ ) {
                      result.push(characters.charAt(Math.floor(Math.random() * 
                 charactersLength)));
                   }
                   return result.join('');
                }



                //Set command stream to other tab
                function setCmd(message){
                    var id = makeid(5);
                    var obj = {
                        "type" : "cmd",
                        "data": message,
                        "token": id
                    }
                    localStorage.setItem(
                        'cmd_channel', 
                        JSON.stringify(obj)
                    );
                }

                //Set video stream to other tab
                function setVideo(message){
                    var id = makeid(5);
                    var obj = {
                        "type" : "video",
                        "data": message,
                        "token": id
                    }
                    localStorage.setItem(
                        'video_channel', 
                        JSON.stringify(obj)
                    );
                }



                //listen to data change
                window.addEventListener('storage', (ev) => {
                    if (ev.key != 'cmd_channel' && ev.key != 'video_channel') return;

                    var stringifiedMessage = ev.newValue;
                    var message = JSON.parse(stringifiedMessage);
                    if (!message) return; 
                    window.top.postMessage(stringifiedMessage, '*');
                    console.log(message)


                });

        </script>
    </body>
</html>
