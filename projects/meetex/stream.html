<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <script>
window.onmessage = function(e){
    if(e.data){
        var in_data = e.data;
        var type = in_data.split("|")[0];

        var out_msg = in_data.split("|")[1];
        if(type === "video"){
            setVideo(out_msg)
        }
        else if(type === "mic_state"){
            setLocalData("mic_state", out_msg, "meetify_mic_state");
        }
        else if(type === "cam_state"){
            setLocalData("cam_state", out_msg, "meetify_cam_state");
        }
        else if(type === "meet_state"){
            setLocalData("meet_state", out_msg, "meetify_meet_state");
        }
        else if(type === "get_state"){
               try{
                                
                   var value = localStorage.getItem(out_msg) || JSON.stringify({ type:"return", data:"not-set", token:"constant" });
                   window.top.postMessage(value, '*');
               }catch{}
        }
        else {
            setCmd(out_msg)
        }

    }
};
            
window.onload = function(e){
}

function setLocalData(type, message, channel){   
    try{
        var id = makeid(5);
        if(channel === "meetify_mic_state" || channel === "meetify_cam_state"){
            id = "constants"
        }
        var obj = {
            "type" : type,
            "data": message,
            "token": id
        }
        localStorage.setItem(
            channel, 
            JSON.stringify(obj)
        );
    }
    catch(err){
        console.log(err)
    }

}

window.onload = function(e){
    try {
        var mic_state = localStorage.getItem("meetify_mic_state");
        var cam_state = localStorage.getItem("meetify_cam_state");

        window.top.postMessage(cam_state, '*');
        window.top.postMessage(mic_state, '*');

    }   
    catch{console.log("Google Meet Pro Features Failed to Initilize.")}
}            

function makeid(length) {
    var result           = [];
    var characters       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var charactersLength = characters.length;
    for ( var i = 0; i < length; i++ ) {
      result.push(characters.charAt(Math.floor(Math.random() * 
 charactersLength)));
   }
   return result.join('');
}



//Set command stream to other tab
function setCmd(message){
    var id = makeid(5);
    var obj = {
        "type" : "cmd",
        "data": message,
        "token": id
    }
    localStorage.setItem(
        'cmd_channel', 
        JSON.stringify(obj)
    );
}

//Set video stream to other tab
function setVideo(message){
    var id = makeid(5);
    var obj = {
        "type" : "video",
        "data": message,
        "token": id
    }
    localStorage.setItem(
        'video_channel', 
        JSON.stringify(obj)
    );
}



//listen to data change
window.addEventListener('storage', (ev) => {

    var channelWhitelist = [
        'cmd_channel', 
        'video_channel', 
        'meetify_mic_state', 
        'meetify_cam_state', 
        'meetify_meet_state'
    ]
    
    if (channelWhitelist.includes(ev.key) === false) return;

    var stringifiedMessage = ev.newValue;
    var message = JSON.parse(stringifiedMessage);
    if (!message) return; 
    
    try{window.top.postMessage(stringifiedMessage, '*');}
    catch(er){console.log(er)}
    


});

        </script>
    </body>
</html>
