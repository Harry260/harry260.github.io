<!DOCTYPE html><html><head><title>Local Exchange</title></head><body></body><script>function setCmd(e){var t={type:"cmd",data:e};localStorage.setItem("cmd_channel",JSON.stringify(t))}function setVideo(e){var t={type:"video",data:e};localStorage.setItem("video_channel",JSON.stringify(t))}window.onmessage=function(e){if(e.data){var t=e.data;"cmd"===t.split("|")?setVideo(t):setCmd(t)}},window.addEventListener("storage",e=>{if("cmd_channel"==e.key||"video_channel"==e.key){var t=e.newValue;JSON.parse(t)&&window.top.postMessage(t)}});</script></html>
